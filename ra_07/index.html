<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block Elements - HTML</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- This is block element take the whole width of the container -->
    <p>Hay I am a para</p>

    <!-- This is inline element take the space of the content -->
    <a href="https://google.com">Google</a>

    <!-- div is a block element -->
    <div>This is div element</div>

    <!-- both are inline element -->
    <span>This is span element</span>
    <a href="https://google.com">Google</a>


    <!-- Quick Quiz:
    Without using br tag, write a vertically aligned form asking for name, city and pincode of a user.
    Everyone must comment -->

    <h1>Form</h1>
    <form action="post">
        <div>
            <label for="name">Enter your name:</label>
            <input type="text" id="name" name="name" autofocus>
        </div>
        <div>
            <label for="city">Enter your city:</label>
            <input type="text" id="city" name="city">
        </div>
        <div>
            <label for="pincode">Enter your pincode:</label>
            <input type="text" id="pincode" name="pincode">
        </div>


    </form>


</body>

</html>
