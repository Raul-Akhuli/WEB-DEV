<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID and Classes in HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ID should be unique, while classes can be shared among multiple elements. -->
    <div id="firstdev" class="red bg-yellow">First</div>  <!-- red and bg-yellow two separate class-->
    <div id="seconddev" class="red">Second</div>
    <span class="red"></span>
</body>
</html>
