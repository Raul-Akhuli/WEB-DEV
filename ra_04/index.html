<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img height="300" src="leaves image.jpg" alt="Leaves Image">
    <br>
    <table>
        <caption>Employee details</caption>

        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Raul</td>
                <td>20</td>
                <td>Kolkata</td>
            </tr>
        </tbody>
        <tr>
            <td colspan="2">Ratul</td>
            <td rowspan="2">25</td>
        </tr>
        <tr>
            <td colspan="2">Sohom</td>
        </tr>

        <tfoot>
            <tr>
                <td colspan="3">Footer Content</td>
            </tr>
        </tfoot>
    </table>


    <!-- unordered list. -->
    <ul type="square">
        <li>Raul</li>
        <li>Ratul</li>
        <li>Sohom</li>
    </ul>

    <!-- ordered list. -->
     <ol type="A">
        <li>Raul</li>
        <li>Ratul</li>
        <li>Sohom</li>
    </ol>

</body>

</html>
