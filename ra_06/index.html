<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Froms - Let's learn it</title>
</head>

<body>
    <h1>Form to Apply for What you actually want</h1>
    <form action="post">
        <div>
            <label for="username">Enter your Username </label>
            <!-- id is use for uniquly identification -->
            <input type="text" id="username" name="username" placeholder="Enter you name" autofocus/>
        </div>

        <div>
            <input type="radio" id="male" name="gender" value="male" />
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female" />
            <label for="female">Female</label>
        </div>

        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes" />
            <label for="subscribe">Subscribe to newsletter</label>
        </div>

        <div>
            <label for="comment">Enter your comment: </label>
            <br>
            <textarea id="comment" name="comment" rows="4" cols="50"></textarea>
        </div>


        <div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="cherry">Cherry</option>
            </select>
        </div>

        <div>
            <!-- you can't put any other than mention pattern -->
            <input type="text" pattern="[a-zA-Z0-9]">
        </div>
    </form>
</body>

</html>
